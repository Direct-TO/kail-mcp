# Fast rebuild overlay.
#
# Usage after one full build and tagging kail-mcp-tools:latest, or after
# importing kail-mcp-tools:latest:
#   docker compose -f docker-compose.yml -f docker-compose.fast.yml up -d --build --force-recreate
#
# Override KAIL_MCP_BASE_IMAGE if you imported the base under another tag.

services:
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.fast
      args:
        KAIL_MCP_BASE_IMAGE: ${KAIL_MCP_BASE_IMAGE:-kail-mcp-tools:latest}
      cache_from:
        - ${KAIL_MCP_BASE_IMAGE:-kail-mcp-tools:latest}
